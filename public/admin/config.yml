backend:
  name: git-gateway
  branch: main

# Test locally with: npx decap-server (then open http://localhost:8080/admin)
local_backend: true

media_folder: "public/assets/images"
public_folder: "/assets/images"

locale: "en"

collections:
  # Renders on /schedule/ above the Firebase event grid (see schedule.astro). Not the grid itself.
  - name: "calendar"
    label: "Schedule page"
    files:
      - name: "schedule_intro"
        label: "Intro text (above schedule)"
        file: "content/calendar.md"
        fields:
          - { label: "Title (optional heading)", name: "title", widget: "string", default: "Schedule page intro" }
          - { label: "Intro", name: "body", widget: "markdown", hint: "Shown at the top of /schedule/. Event list/times use the schedule admin on that page." }

  - name: "photos"
    label: "Photos"
    folder: "content/photos"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Caption", name: "caption", widget: "string", required: false }
