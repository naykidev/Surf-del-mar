backend:
  name: git-gateway
  branch: main

# Test locally with: npx decap-server (then open http://localhost:8080/admin)
local_backend: true

media_folder: "public/assets/images"
public_folder: "/assets/images"

locale: "en"

collections:
  # Full schedule content for /schedule/ (single markdown source of truth).
  - name: "calendar"
    label: "Schedule page"
    files:
      - name: "schedule_intro"
        label: "Schedule content"
        file: "content/calendar.md"
        fields:
          - { label: "Title", name: "title", widget: "string", default: "Festival Schedule" }
          - { label: "Schedule markdown", name: "body", widget: "markdown", hint: "This file now powers the entire /schedule/ page. Edit day headings and bullet items directly." }

  - name: "photos"
    label: "Photos"
    folder: "content/photos"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Caption", name: "caption", widget: "string", required: false }
